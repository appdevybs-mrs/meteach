name: dream_english_academy
description: "Dream English Academy – Assistant, Classroom, Stories"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🎤 Speech & TTS
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  table_calendar: ^3.2.0
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.0
  flutter_timezone: ^5.0.1

  # 🔐 Permissions & storage
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  intl: ^0.20.2

  # 🔥 Firebase
  firebase_core: ^3.0.0
  firebase_database: ^11.0.0
  firebase_auth: ^5.1.0

  # 🔑 Google Sign-In
  google_sign_in: ^6.2.1
  android_intent_plus: ^5.3.0

  # 📸 Image picker (thumbnail upload)
  image_picker: ^1.1.2

  # 🌐 HTTP (PHP upload endpoint)
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/ybs_logo.png
    - assets/images/character.png
