name: dream_english_academy
description: "Your Bridge School  – Not for The Certificate for The Skill"

publish_to: 'none'

version: 2.0.0+115

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  # 🎤 Speech & TTS
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  table_calendar: ^3.2.0
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.0
  flutter_timezone: ^5.0.1
  firebase_crashlytics: ^5.0.7
  excel: ^4.0.6
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  # 🔐 Storage
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  uuid: ^4.4.0
  flutter_secure_storage: ^9.2.2
  font_awesome_flutter: ^10.11.0
  webview_flutter: ^4.13.1

  # 🔥 Firebase
  firebase_database: ^12.1.3
  package_info_plus: ^8.0.0
  # 🔑 Google Sign-In
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  android_intent_plus: ^5.3.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.6
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1

  # 📸 Image picker (thumbnail upload)
  image_picker: ^1.1.2

  # 🌐 HTTP (PHP upload endpoint)
  http: ^1.2.2
  connectivity_plus: ^6.1.4
  audioplayers: ^6.0.0
  record: ^6.2.0
  pdf: ^3.11.1
  printing: ^5.14.0
  syncfusion_flutter_pdfviewer: ^28.2.12
  crypto: ^3.0.7
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.23.8
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher Icon Configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/ybs_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/ybs_logo.png"


flutter:
  uses-material-design: true
  assets:
    - assets/images/ybs_logo.png
    - assets/images/character.png
    - assets/images/DigitalCertificate.pdf
    - assets/images/DigitalCertificate.png
    - assets/images/digital_cert_exam.pdf
    - assets/images/digital_cert_exam.png
    - assets/fonts/PlayfairDisplay-Regular.ttf
    - assets/fonts/PlayfairDisplay-Bold.ttf
    - assets/fonts/HughIsLife.ttf
