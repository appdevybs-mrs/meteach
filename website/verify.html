<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Certificate - Your Bridge School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <style>
    :root {
      --navy: #1a2b48;
      --orange: #f98d28;
      --bg: #f4f7f9;
      --text: #243042;
      --muted: #6e7b8c;
      --line: #dbe4ee;
      --white: #ffffff;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Manrope, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 0 20px;
    }

    .topbar-inner {
      max-width: 900px;
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-weight: 800;
      font-size: 18px;
      text-decoration: none;
    }

    .brand img {
      width: 36px;
      height: 36px;
      border-radius: 9px;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .verify-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(26, 43, 72, 0.08);
    }

    .verify-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .verify-icon {
      width: 56px;
      height: 56px;
      background: #eaf2ff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .verify-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .verify-subtitle {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .step-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--line);
      transition: background 0.3s;
    }

    .step-dot.active {
      background: var(--orange);
    }

    .step-dot.completed {
      background: var(--green);
    }

    .step-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(26, 43, 72, 0.1);
    }

    .form-input::placeholder {
      color: #a0aab5;
    }

    .btn-verify {
      width: 100%;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-verify:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(249, 141, 40, 0.35);
    }

    .btn-verify:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--navy);
      color: var(--white);
    }

    .btn-secondary:hover:not(:disabled) {
      box-shadow: 0 8px 20px rgba(26, 43, 72, 0.25);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-card {
      margin-top: 24px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid;
    }

    .result-header {
      padding: 24px;
      text-align: center;
    }

    .result-header.found {
      background: #f0f9ff;
      border-color: #7dd3fc;
    }

    .result-header.success {
      background: #f0fdf4;
      border-color: #86efac;
    }

    .result-header.failed {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    .result-header.not-found {
      background: #fff7ed;
      border-color: #fed7aa;
    }

    .result-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .result-icon.found { color: var(--navy); }
    .result-icon.success { color: var(--green); }
    .result-icon.failed { color: var(--red); }
    .result-icon.not-found { color: #f97316; }

    .result-status {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-status.found { color: var(--navy); }
    .result-status.success { color: #15803d; }
    .result-status.failed { color: #b91c1c; }
    .result-status.not-found { color: #c2410c; }

    .result-message {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .result-details {
      padding: 20px;
      background: var(--white);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .detail-value {
      font-size: 13px;
      color: var(--navy);
      font-weight: 700;
      text-align: right;
    }

    .detail-value.status-valid { color: var(--green); }
    .detail-value.status-expired { color: var(--amber); }
    .detail-value.status-revoked { color: var(--red); }

    .footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .error-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }

    .error-box.show {
      display: block;
    }

    .info-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      color: #c2410c;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }

    .info-box.show {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-badge.valid {
      background: #dcfce7;
      color: #15803d;
    }

    .status-badge.expired {
      background: #fef3c7;
      color: #b45309;
    }

    .status-badge.revoked {
      background: #fee2e2;
      color: #b91c1c;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .back-link:hover {
      color: var(--navy);
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand">
        <img src="https://via.placeholder.com/36/1A2B48/FFFFFF?text=YBS" alt="Your Bridge School" onerror="this.style.display='none'" />
        Your Bridge School
      </a>
    </div>
  </header>

  <main class="main">
    <div class="verify-card">
      <div class="verify-header">
        <div class="verify-icon">&#128272;</div>
        <div>
          <div class="verify-title">Certificate Verification</div>
          <div class="verify-subtitle">Secure verification with multi-step validation</div>
        </div>
      </div>

      <div class="step-indicator">
        <div class="step-dot" id="step1Dot"></div>
        <div class="step-dot" id="step2Dot"></div>
        <div class="step-dot" id="step3Dot"></div>
      </div>

      <!-- Step 1: CVN Entry -->
      <div id="step1">
        <p class="step-label">Step 1: Enter Certificate Number</p>
        
        <form id="step1Form" onsubmit="handleStep1(event)">
          <div class="form-group">
            <label class="form-label" for="cvnInput">Certificate Validation Number (CVN)</label>
            <input 
              type="text" 
              id="cvnInput" 
              class="form-input" 
              placeholder="e.g., DZ01SB-2026-00001"
              autocomplete="off"
              required
            />
          </div>

          <div class="error-box" id="step1Error"></div>

          <button type="submit" class="btn-verify" id="step1Btn">
            <span id="step1BtnText">Look Up Certificate</span>
            <div class="spinner" id="step1Spinner" style="display:none"></div>
          </button>
        </form>
      </div>

      <!-- Step 2: Verify Ownership -->
      <div id="step2" class="hidden">
        <span class="back-link" onclick="goToStep1()">&#8592; Back to CVN search</span>
        <p class="step-label">Step 2: Verify Ownership</p>

        <form id="step2Form" onsubmit="handleStep2(event)">
          <div class="form-group">
            <label class="form-label" for="last4Input">Last 4 Digits of National ID</label>
            <input 
              type="text" 
              id="last4Input" 
              class="form-input" 
              placeholder="e.g., 1234"
              maxlength="4"
              pattern="[0-9]{4}"
              autocomplete="off"
              required
            />
          </div>

          <div class="error-box" id="step2Error"></div>

          <button type="submit" class="btn-verify" id="step2Btn">
            <span id="step2BtnText">Verify Certificate</span>
            <div class="spinner" id="step2Spinner" style="display:none"></div>
          </button>
        </form>
      </div>

      <!-- Step 3: Result -->
      <div id="step3" class="hidden">
        <span class="back-link" onclick="resetVerification()">&#8592; New verification</span>
        <div id="resultArea"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 Your Bridge School. All rights reserved.
  </footer>

  <script>
    const FIREBASE_RTDB_URL = 'https://YOUR-FIREBASE-PROJECT.firebaseio.com';
    
    let currentCert = null;
    let attemptCount = 0;
    let lockedUntil = null;
    const MAX_ATTEMPTS = 3;
    const LOCK_DURATION_MS = 60 * 60 * 1000; // 1 hour

    function updateStepIndicator(step) {
      document.getElementById('step1Dot').className = 'step-dot' + (step >= 1 ? ' active' : '');
      document.getElementById('step2Dot').className = 'step-dot' + (step >= 2 ? ' active' : '');
      document.getElementById('step3Dot').className = 'step-dot' + (step >= 3 ? ' active' : '');
    }

    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.add('show');
    }

    function hideError(elementId) {
      const el = document.getElementById(elementId);
      el.classList.remove('show');
    }

    function isLocked() {
      if (!lockedUntil) return false;
      if (Date.now() > lockedUntil) {
        lockedUntil = null;
        attemptCount = 0;
        return false;
      }
      return true;
    }

    function getRemainingLockTime() {
      if (!lockedUntil) return '';
      const remaining = lockedUntil - Date.now();
      const hours = Math.floor(remaining / (1000 * 60 * 60));
      const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
      if (hours > 0) {
        return `${hours} hour${hours > 1 ? 's' : ''} ${mins} min`;
      }
      return `${mins} min`;
    }

    async function handleStep1(e) {
      e.preventDefault();
      
      if (isLocked()) {
        showError('step1Error', `Too many attempts. Please wait ${getRemainingLockTime()}.`);
        return;
      }

      const cvn = document.getElementById('cvnInput').value.trim();
      if (!cvn) {
        showError('step1Error', 'Please enter a CVN');
        return;
      }

      const btn = document.getElementById('step1Btn');
      const btnText = document.getElementById('step1BtnText');
      const spinner = document.getElementById('step1Spinner');
      
      btn.disabled = true;
      btnText.textContent = 'Looking up...';
      spinner.style.display = 'block';
      hideError('step1Error');

      try {
        const response = await fetch(
          `${FIREBASE_RTDB_URL}/certificates.json?orderBy="cvn"&equalTo="${cvn}"`,
          { method: 'GET' }
        );

        if (!response.ok) {
          throw new Error('Service unavailable');
        }

        const data = await response.json();
        const certKey = data ? Object.keys(data)[0] : null;
        const cert = certKey ? data[certKey] : null;

        if (!cert) {
          attemptCount++;
          if (attemptCount >= MAX_ATTEMPTS) {
            lockedUntil = Date.now() + LOCK_DURATION_MS;
            showError('step1Error', 'Too many failed attempts. Please try again in 1 hour.');
          } else {
            showError('step1Error', `Certificate not found. ${MAX_ATTEMPTS - attemptCount} attempt${MAX_ATTEMPTS - attemptCount > 1 ? 's' : ''} remaining.`);
          }
          showStep3NotFound();
        } else {
          currentCert = cert;
          currentCert._key = certKey;
          goToStep2();
        }
      } catch (err) {
        showError('step1Error', 'Verification service unavailable. Please try again later.');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Look Up Certificate';
        spinner.style.display = 'none';
      }
    }

    async function handleStep2(e) {
      e.preventDefault();

      if (isLocked()) {
        showError('step2Error', `Too many attempts. Please wait ${getRemainingLockTime()}.`);
        return;
      }

      const enteredLast4 = document.getElementById('last4Input').value.trim();

      if (enteredLast4.length !== 4) {
        showError('step2Error', 'Please enter exactly 4 digits');
        return;
      }

      const btn = document.getElementById('step2Btn');
      const btnText = document.getElementById('step2BtnText');
      const spinner = document.getElementById('step2Spinner');
      
      btn.disabled = true;
      btnText.textContent = 'Verifying...';
      spinner.style.display = 'block';
      hideError('step2Error');

      try {
        await new Promise(resolve => setTimeout(resolve, 800));

        const storedLast4 = currentCert.nationalIdNumber.slice(-4);
        const last4Match = enteredLast4 === storedLast4;

        if (last4Match) {
          goToStep3Success();
        } else {
          attemptCount++;
          if (attemptCount >= MAX_ATTEMPTS) {
            lockedUntil = Date.now() + LOCK_DURATION_MS;
            showError('step2Error', 'Too many failed attempts. Please try again in 1 hour.');
          } else {
            goToStep3Failed();
          }
        }
      } catch (err) {
        showError('step2Error', 'Verification failed. Please try again.');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Verify Certificate';
        spinner.style.display = 'none';
      }
    }

    function goToStep1() {
      document.getElementById('step1').classList.remove('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.add('hidden');
      updateStepIndicator(1);
    }

    function goToStep2() {
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
      document.getElementById('step3').classList.add('hidden');
      
      document.getElementById('last4Input').value = '';
      hideError('step2Error');
      
      updateStepIndicator(2);
    }

    function goToStep3Success() {
      const effective = getEffectiveStatus(currentCert);
      const statusLabel = effective.charAt(0).toUpperCase() + effective.slice(1);
      const maskedId = maskNationalId(currentCert.nationalIdNumber);
      
      const today = new Date();
      const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;

      document.getElementById('resultArea').innerHTML = `
        <div class="result-card">
          <div class="result-header success">
            <div class="result-icon success">&#10003;</div>
            <div class="result-status success">Verification Successful</div>
            <div class="result-message">This certificate is authentic and verified.</div>
          </div>
          <div class="result-details">
            <div class="detail-row">
              <span class="detail-label">Certificate Holder</span>
              <span class="detail-value">${currentCert.fullName || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Certificate Title</span>
              <span class="detail-value">${currentCert.certificateTitle || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Training Date</span>
              <span class="detail-value">${currentCert.trainingDate || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Expiration Date</span>
              <span class="detail-value">${currentCert.expirationDate || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">National ID</span>
              <span class="detail-value">${maskedId || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Status</span>
              <span class="detail-value status-${effective}">${statusLabel}</span>
            </div>
          </div>
          <div style="padding: 12px 20px; background: #f8fafc; font-size: 11px; color: var(--muted); font-style: italic; text-align: center;">
            Verification conducted on ${dateStr}
          </div>
        </div>
      `;

      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.remove('hidden');
      updateStepIndicator(3);
    }

    function goToStep3Failed() {
      const today = new Date();
      const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;

      document.getElementById('resultArea').innerHTML = `
        <div class="result-card">
          <div class="result-header failed">
            <div class="result-icon failed">&#10007;</div>
            <div class="result-status failed">Verification Failed</div>
            <div class="result-message">The details provided do not match our records.</div>
          </div>
          <div style="padding: 16px 20px; background: #f8fafc; font-size: 11px; color: var(--muted); font-style: italic; text-align: center;">
            Verification conducted on ${dateStr}
          </div>
        </div>
      `;

      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.remove('hidden');
      updateStepIndicator(3);
    }

    function showStep3NotFound() {
      const today = new Date();
      const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;

      document.getElementById('resultArea').innerHTML = `
        <div class="result-card">
          <div class="result-header not-found">
            <div class="result-icon not-found">&#128269;</div>
            <div class="result-status not-found">Certificate Not Found</div>
            <div class="result-message">
              No certificate found with this CVN. Please check the number and try again.
            </div>
          </div>
          <div style="padding: 16px 20px; background: #f8fafc; font-size: 11px; color: var(--muted); font-style: italic; text-align: center;">
            Verification conducted on ${dateStr}
          </div>
        </div>
      `;

      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.remove('hidden');
      updateStepIndicator(3);
    }

    function resetVerification() {
      currentCert = null;
      document.getElementById('cvnInput').value = '';
      goToStep1();
    }

    function maskNationalId(id) {
      if (!id || id.length <= 4) return id;
      return '*'.repeat(id.length - 4) + id.slice(-4);
    }

    function getEffectiveStatus(cert) {
      if (cert.status === 'revoked') return 'revoked';
      
      const expDate = cert.expirationDate;
      if (expDate) {
        const exp = new Date(expDate);
        if (new Date() > exp) {
          return 'expired';
        }
      }
      
      return 'valid';
    }

    updateStepIndicator(1);
  </script>
</body>
</html>
