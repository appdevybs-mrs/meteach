<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery - Your Bridge School</title>
  <meta name="description" content="Gallery for Your Bridge School.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="/"><span class="brand-mark">YB</span><span class="brand-text">Your Bridge School</span></a>
      <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="site-menu">Menu</button>
      <nav class="site-menu" id="site-menu" data-menu>
        <a href="/">Home</a>
        <a href="/media/">Media</a>
        <a class="active" href="/gallery/">Gallery</a>
        <a href="/training/">Training</a>
        <a class="login-link" href="https://www.yourbridgeschool.com/online">Login</a>
        <label class="lang-picker"><select id="language-switcher" class="lang-select"><option value="en">EN</option><option value="ar">AR</option><option value="fr">FR</option></select></label>
      </nav>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="section-head center">
        <h1>Our Gallery</h1>
        <p>Discover moments from our students' learning journey</p>
      </div>
      <div class="gallery-stage" style="position:relative; min-height:420px;">
        <div class="gallery-slide is-active" style="position:absolute; inset:0; opacity:1; transform:none;">
          <div class="gallery-art art-one"></div>
          <div class="gallery-caption"><h3>Creative classroom moments</h3><p>Interactive sessions and active learning.</p></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/main.js"></script>
</body>
</html>
