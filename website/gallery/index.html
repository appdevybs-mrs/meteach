<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery - Your Bridge School</title>
  <meta name="description" content="Gallery for Your Bridge School.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="/"><span class="brand-mark">YB</span><span class="brand-text">Your Bridge School</span></a>
      <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="site-menu">Menu</button>
      <nav class="site-menu" id="site-menu" data-menu>
        <a href="/">Home</a>
        <a href="/media/">Media</a>
        <a class="active" href="/gallery/">Gallery</a>
        <a href="/training/">Training</a>
        <a class="login-link" href="https://www.yourbridgeschool.com/online">Login</a>
        <label class="lang-picker"><select id="language-switcher" class="lang-select"><option value="en">EN</option><option value="ar">AR</option><option value="fr">FR</option></select></label>
      </nav>
    </div>
  </header>

  <main class="section-pad gallery-page">
    <div class="container gallery-board">
      <div class="section-head center">
        <h1 data-i18n="gallery.title">Our Gallery</h1>
        <p data-i18n="gallery.lead">Discover moments from our students' learning journey</p>
      </div>

      <section class="gallery-section-block">
        <div class="section-head">
          <h2 data-i18n="gallery.photosTitle">Photos</h2>
        </div>
        <div class="gallery-media-grid" data-public-gallery-photos></div>
      </section>

      <section class="gallery-section-block">
        <div class="section-head">
          <h2 data-i18n="gallery.videosTitle">Videos</h2>
        </div>
        <div class="gallery-media-grid" data-public-gallery-videos></div>
      </section>
    </div>

    <div class="gallery-modal" data-gallery-modal hidden>
      <div class="gallery-modal-backdrop" data-gallery-close></div>
      <div class="gallery-modal-dialog" role="dialog" aria-modal="true" aria-label="Gallery preview">
        <button class="gallery-modal-close" type="button" data-gallery-close aria-label="Close">×</button>
        <div class="gallery-modal-body" data-gallery-modal-body></div>
      </div>
    </div>
  </main>

  <script src="/assets/js/main.js"></script>
</body>
</html>
