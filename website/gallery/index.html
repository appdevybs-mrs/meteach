<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery - Your Bridge School</title>
  <meta name="description" content="Gallery for Your Bridge School.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="/"><span class="brand-mark">YB</span><span class="brand-text">Your Bridge School</span></a>
      <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="site-menu">Menu</button>
      <nav class="site-menu" id="site-menu" data-menu>
        <a href="/">Home</a>
        <a href="/media/">Media</a>
        <a class="active" href="/gallery/">Gallery</a>
        <a href="/training/">Training</a>
        <a class="login-link" href="https://www.yourbridgeschool.com/online">Login</a>
        <label class="lang-picker"><select id="language-switcher" class="lang-select"><option value="en">EN</option><option value="ar">AR</option><option value="fr">FR</option></select></label>
      </nav>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="section-head center">
        <h1 data-i18n="gallery.title">Our Gallery</h1>
        <p data-i18n="gallery.lead">Discover moments from our students' learning journey</p>
      </div>
      <div class="gallery-feed card gallery-feed-compact" data-public-gallery data-gallery-target="page">
        <div class="gallery-state" data-gallery-state>
          <span class="gallery-spinner"></span>
          <span data-i18n="gallery.loading">Loading gallery...</span>
        </div>
        <div class="gallery-carousel" data-gallery-carousel hidden>
          <button class="gallery-arrow prev" type="button" data-gallery-prev aria-label="Previous gallery item">‹</button>
          <div class="gallery-viewport">
            <div class="gallery-track" data-gallery-track></div>
          </div>
          <button class="gallery-arrow next" type="button" data-gallery-next aria-label="Next gallery item">›</button>
        </div>
        <div class="gallery-dots" data-gallery-dots hidden></div>
        <div class="gallery-state is-empty" data-gallery-empty hidden>
          <strong data-i18n="gallery.emptyTitle">No gallery items yet</strong>
          <span data-i18n="gallery.emptyText">New photos and videos will appear here when teachers publish them.</span>
        </div>
        <div class="gallery-state is-error" data-gallery-error hidden>
          <strong data-i18n="gallery.errorTitle">Gallery unavailable</strong>
          <span data-i18n="gallery.errorText">We could not load the live gallery right now.</span>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/main.js"></script>
</body>
</html>
